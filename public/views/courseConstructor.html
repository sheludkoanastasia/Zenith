<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор курса - Zenith</title>
    <link rel="stylesheet" href="/public/css/courseConstructor.css">
    <link href="https://fonts.googleapis.com/css2?family=Ysabeau:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo">
            <img src="/images/mainPage/logo.svg" alt="Zenith Logo">
        </div>
        <div class="nav-right">
            <button class="back-button" id="backToCourseBtn">
                Вернуться к содержанию курса
            </button>
        </div>
    </header>

    <div class="main-container">
        <!-- Левая панель навигации -->
        <aside class="sidebar">
            <div class="sidebar-content">
                <div class="course-info" id="courseInfo">
                    <h2 class="course-title" id="courseTitle">Загрузка...</h2>
                </div>
                <div class="themes-list" id="themesList">
                    <!-- Динамически будут подгружаться темы и блоки -->
                </div>
            </div>
        </aside>

        <!-- Основная область контента -->
        <main class="content-area">
            <!-- Декоративное изображение внизу - перенесли в начало content-area как фон -->
            <div class="gradient-decoration">
                <img src="/images/taskCreationPage/backgroundConstructor.png" alt="background">
            </div>
            
            <div class="content-wrapper" id="contentWrapper">
                <!-- Приветственный экран -->
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-content">
                        <h2>Выберите блок для редактирования</h2>
                        <p>Нажмите на любой блок в левой панели, чтобы начать создание заданий</p>
                    </div>
                </div>

                <!-- Область для отображения разделов блока -->
                <div class="sections-area" id="sectionsArea" style="display: none;">
                    <div class="block-header">
                        <h2 class="block-title" id="currentBlockTitle"></h2>
                        <p class="block-description" id="currentBlockDescription"></p>
                    </div>

                    <!-- Список разделов -->
                    <div class="sections-list" id="sectionsList">
                        <!-- Здесь будут отображаться созданные разделы -->
                    </div>

                    <!-- Кнопка создания нового раздела с контейнером для меню -->
                    <div class="add-section-wrapper" id="addSectionWrapper">
                        <button class="add-section-btn" id="showCreateMenuBtn">
                            <span>+</span> Создать раздел
                        </button>
                        
                        <!-- Меню выбора типа раздела (появляется под кнопкой) -->
                        <div class="create-menu" id="createMenu" style="display: none;">
                            <div class="create-menu-header">
                                <h3>Выберите тип раздела</h3>
                            </div>
                            <div class="create-options">
                                <button class="create-option theory-option" data-type="theory">
                                    <img src="/images/taskCreationPage/Books.svg" alt="Теория" class="option-icon-svg">
                                    <span>Теория</span>
                                </button>
                                <button class="create-option exercise-option" data-type="exercise">
                                    <img src="/images/taskCreationPage/Open-Book-desk.svg" alt="Упражнение" class="option-icon-svg">
                                    <span>Упражнение</span>
                                </button>
                                <button class="create-option test-option" data-type="test">
                                    <img src="/images/taskCreationPage/Table-Clock.svg" alt="Итоговый тест" class="option-icon-svg">
                                    <span>Итоговый тест</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Модальное окно для редактирования названия -->
    <div class="modal" id="editModal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Редактирование названия</h3>
                <button class="modal-close" id="closeModalBtn">×</button>
            </div>
            <div class="modal-body" id="modalBody">
                <div class="form-group">
                    <label>Название раздела</label>
                    <input type="text" id="editTitle" class="edit-title-input" placeholder="Введите название раздела">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="cancelModalBtn">Отмена</button>
                <button class="btn-save" id="saveModalBtn">Сохранить</button>
            </div>
        </div>
    </div>

    <script src="/public/js/courseConstructor.js"></script>
</body>
</html>
