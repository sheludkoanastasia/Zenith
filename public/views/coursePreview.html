<!-- public/views/coursePreview.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith - Просмотр курса</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ysabeau:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/public/css/coursePreview.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="/images/userMainPanel/logo.svg" alt="Zenith Logo">
        </div>

        <div class="nav-right">
            <a href="/teacher" class="back-to-profile">Вернуться к профилю</a>
        </div>
    </header>

    <main class="course-creation-container">
        <!-- Основной блок с информацией о курсе -->
        <div class="course-info-grid">
            <!-- Левая колонка - изображение курса -->
            <div class="course-image-column">
                <div class="course-image-upload" id="courseImageUpload">
                    <img src="/images/teacherMainPanel/plus.svg" alt="Изображение курса" class="upload-placeholder">
                </div>
            </div>

            <!-- Правая колонка - информация о курсе -->
            <div class="course-details-column">
                <div class="course-info-row">
                    <div class="course-info-left">
                        <div>
                            <h1 class="course-title">
                                <input type="text" id="courseTitle" class="course-title-input" placeholder="Название курса" disabled>
                            </h1>
                        </div>
                        <div>
                            <div class="course-teacher" id="courseTeacher">
                                Преподаватель: <span id="teacherName"></span>
                            </div>
                            <div class="course-students-count" id="courseStudentsCount">
                                Количество студентов: <span id="countStudents">0</span>
                            </div>
                        </div>
                    </div>
                    <div class="course-info-right" id="courseProgressContainer" style="display: none;">
                        <div class="course-progress">
                            <div class="progress-label">Ваш прогресс по курсу</div>
                            <div class="progress-visual">
                                <div class="progress-image-wrapper">
                                    <img src="/images/userMainPanel/progress.svg" alt="Прогресс" class="progress-image">
                                    <div class="progress-bar-fill-overlay" style="width: 0%"></div>
                                </div>
                                <span class="progress-percent" id="progressPercent">0%</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            </div>
            </div>
        </div>

        <!-- Навигация по разделам -->
        <div class="course-sections-nav">
            <a href="#" class="active" id="courseBlocksLink">Содержание курса</a>
            <a href="#" id="coursePerformanceLink">Успеваемость</a>
        </div>

        <!-- Контейнер для контента разделов -->
        <div class="sections-content" id="sectionsContent">
            <!-- Контент будет подгружаться динамически -->
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="/public/js/coursePreview.js"></script>
</body>
</html>
